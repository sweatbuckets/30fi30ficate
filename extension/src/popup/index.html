<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>30ficate</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-brand">
        <div class="popup-brand-mark">
          <img
            alt="30ficate logo"
            class="popup-brand-mark-image"
            src="../../assets/icons/3030icon.svg"
          />
        </div>
        <div class="popup-brand-copy">
          <p class="popup-brand-title">30ficate</p>
          <p class="popup-brand-subtitle">Certificate trust console</p>
        </div>
      </header>

      <section class="popup-main">
        <div class="popup-topbar">
          <div class="popup-copy">
            <p class="popup-eyebrow">Active Tab</p>
            <h1 class="popup-title">온체인 검증 결과</h1>
            <p class="popup-subtitle">
              현재 탭의 HTTPS 인증서가 온체인 승인된 인증서인지 확인합니다.
            </p>
          </div>
          <div class="popup-tab-chip">TLS captured</div>
        </div>

        <section id="status-card" class="status-card status-unknown">
          <div class="status-row">
            <span id="status-dot" class="status-dot"></span>
            <div class="status-copy">
              <p id="status-label" class="status-label">Unknown</p>
              <p id="status-message" class="status-message">아직 검증 결과가 없습니다.</p>
            </div>
          </div>
          <div id="warning-banner" class="warning-banner" hidden></div>
          <button id="recheck-button" class="recheck-button" type="button" hidden>
            인증서 다시 읽기
          </button>
        </section>

        <section class="info-card">
          <div class="info-card-header">
            <div>
              <p class="section-eyebrow">On-chain Context</p>
              <h2>검증 정보</h2>
            </div>
          </div>
          <div class="info-grid">
            <div class="detail detail-domain">
              <span class="label">Domain</span>
              <span id="domain-value" class="value value-domain">-</span>
            </div>
            <div class="detail detail-wide">
              <span class="label">domainHash</span>
              <span id="domain-hash-value" class="value value-hash mono">-</span>
            </div>
            <div class="detail detail-wide">
              <span class="label">certHash</span>
              <span id="cert-hash-value" class="value value-accent value-hash mono">-</span>
            </div>
          </div>
          <div class="info-card-meta">
            <span class="info-card-meta-label">최근 시도</span>
            <span id="checked-at-value" class="info-card-meta-value">-</span>
          </div>
        </section>

        <section class="info-card">
          <div class="info-card-header">
            <div>
              <p class="section-eyebrow">TLS Evidence</p>
              <h2>Certificate Chain</h2>
            </div>
          </div>
          <div id="chain-list" class="chain-list">
            <p class="chain-empty">-</p>
          </div>
        </section>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
